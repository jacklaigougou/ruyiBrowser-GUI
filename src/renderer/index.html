<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>ruyiPage GUI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo">ruyiPage</div>
      <nav class="nav">
        <button class="nav-item active" data-page="dashboard">控制台</button>
        <button class="nav-item" data-page="sessions">会话管理</button>
        <button class="nav-item" data-page="browser">浏览器操作</button>
        <button class="nav-item" data-page="settings">设置</button>
      </nav>
      <div class="status-bar">
        <span id="service-dot" class="dot dot--off"></span>
        <span id="service-label">Python服务未连接</span>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 控制台页 -->
      <section id="page-dashboard" class="page active">
        <h1>控制台</h1>
        <div class="card-grid">
          <div class="card">
            <div class="card-title">活跃会话</div>
            <div class="card-value" id="stat-sessions">—</div>
          </div>
          <div class="card">
            <div class="card-title">Python服务</div>
            <div class="card-value" id="stat-service">—</div>
          </div>
        </div>
        <div class="log-box">
          <div class="log-header">操作日志</div>
          <div id="log-output" class="log-content"></div>
        </div>
      </section>

      <!-- 会话管理页 -->
      <section id="page-sessions" class="page">
        <h1>会话管理</h1>
        <div class="toolbar">
          <button id="btn-launch" class="btn btn--primary">启动新浏览器</button>
          <button id="btn-refresh-sessions" class="btn">刷新</button>
        </div>
        <div id="sessions-list" class="sessions-list"></div>

        <!-- 启动浏览器表单 -->
        <div id="launch-form" class="modal hidden">
          <div class="modal-box">
            <h2>启动浏览器</h2>
            <label>Firefox路径
              <input id="launch-browser-path" type="text" placeholder="留空使用默认" />
            </label>
            <label>用户数据目录
              <input id="launch-user-dir" type="text" placeholder="留空使用默认" />
            </label>
            <label>代理
              <input id="launch-proxy" type="text" placeholder="http://127.0.0.1:7890" />
            </label>
            <label>人类轨迹算法
              <select id="launch-algo">
                <option value="">默认</option>
                <option value="bezier">bezier</option>
                <option value="windmouse">windmouse</option>
              </select>
            </label>
            <label class="checkbox-label">
              <input id="launch-headless" type="checkbox" />
              无头模式
            </label>
            <div class="modal-actions">
              <button id="btn-launch-confirm" class="btn btn--primary">启动</button>
              <button id="btn-launch-cancel" class="btn">取消</button>
            </div>
          </div>
        </div>
      </section>

      <!-- 浏览器操作页 -->
      <section id="page-browser" class="page">
        <h1>浏览器操作</h1>
        <div class="toolbar">
          <label>当前会话
            <select id="op-session-select"></select>
          </label>
        </div>

        <div class="ops-grid">
          <!-- 导航 -->
          <div class="op-card">
            <h3>导航</h3>
            <input id="op-url" type="text" placeholder="https://example.com" />
            <button class="btn btn--primary" id="btn-navigate">前往</button>
            <div class="op-result" id="result-navigate"></div>
          </div>

          <!-- 查找元素 -->
          <div class="op-card">
            <h3>查找元素</h3>
            <input id="op-selector" type="text" placeholder="CSS选择器 / XPath" />
            <button class="btn" id="btn-find">查找</button>
            <div class="op-result" id="result-find"></div>
          </div>

          <!-- 点击 -->
          <div class="op-card">
            <h3>点击元素</h3>
            <input id="op-click-selector" type="text" placeholder="CSS选择器 / XPath" />
            <button class="btn" id="btn-click">点击</button>
            <div class="op-result" id="result-click"></div>
          </div>

          <!-- 输入 -->
          <div class="op-card">
            <h3>输入文字</h3>
            <input id="op-input-selector" type="text" placeholder="CSS选择器" />
            <input id="op-input-text" type="text" placeholder="输入内容" />
            <button class="btn" id="btn-input">输入</button>
            <div class="op-result" id="result-input"></div>
          </div>

          <!-- 截图 -->
          <div class="op-card op-card--wide">
            <h3>截图</h3>
            <button class="btn" id="btn-screenshot">截图</button>
            <div id="screenshot-preview" class="screenshot-preview"></div>
          </div>

          <!-- 执行JS -->
          <div class="op-card op-card--wide">
            <h3>执行JavaScript</h3>
            <textarea id="op-script" rows="4" placeholder="document.title"></textarea>
            <button class="btn" id="btn-script">执行</button>
            <div class="op-result" id="result-script"></div>
          </div>

          <!-- Cookie -->
          <div class="op-card op-card--wide">
            <h3>Cookie管理</h3>
            <button class="btn" id="btn-get-cookies">获取Cookie</button>
            <div class="op-result" id="result-cookies"></div>
          </div>

          <!-- 页面信息 -->
          <div class="op-card">
            <h3>页面信息</h3>
            <button class="btn" id="btn-page-info">获取信息</button>
            <div class="op-result" id="result-page-info"></div>
          </div>
        </div>
      </section>

      <!-- 设置页 -->
      <section id="page-settings" class="page">
        <h1>设置</h1>
        <div class="settings-form">
          <label>Python服务地址
            <input id="cfg-base-url" type="text" value="http://127.0.0.1:7788" />
          </label>
          <label>请求超时(ms)
            <input id="cfg-timeout" type="number" value="30000" />
          </label>
          <button class="btn btn--primary" id="btn-save-config">保存</button>
          <div id="config-result" class="op-result"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
