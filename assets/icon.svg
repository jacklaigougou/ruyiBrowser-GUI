<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <!-- 金色渐变 -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="40%"  stop-color="#D4A017"/>
      <stop offset="70%"  stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- 绿色渐变 -->
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4CAF7D"/>
      <stop offset="50%"  stop-color="#2E8B57"/>
      <stop offset="100%" stop-color="#1B5E35"/>
    </linearGradient>
    <!-- 投影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- ══════ 顶部如意云头：金边 ══════ -->
  <!-- 左云瓣 -->
  <circle cx="62"  cy="68" r="36" fill="url(#gold)" filter="url(#shadow)"/>
  <!-- 右云瓣 -->
  <circle cx="138" cy="68" r="36" fill="url(#gold)" filter="url(#shadow)"/>
  <!-- 中间云瓣（稍大） -->
  <circle cx="100" cy="52" r="42" fill="url(#gold)" filter="url(#shadow)"/>

  <!-- 顶部如意云头：绿色填充 -->
  <circle cx="62"  cy="68" r="28" fill="url(#green)"/>
  <circle cx="138" cy="68" r="28" fill="url(#green)"/>
  <circle cx="100" cy="52" r="34" fill="url(#green)"/>

  <!-- 三瓣之间连接填充（金色） -->
  <ellipse cx="100" cy="83" rx="48" ry="22" fill="url(#gold)"/>
  <!-- 连接填充绿色 -->
  <ellipse cx="100" cy="83" rx="40" ry="16" fill="url(#green)"/>

  <!-- ══════ 柄部：金边 ══════ -->
  <!-- 上粗柄 -->
  <rect x="76" y="90" width="48" height="80" rx="24" ry="24" fill="url(#gold)"/>
  <!-- 下水滴形 -->
  <ellipse cx="100" cy="210" rx="28" ry="38" fill="url(#gold)" filter="url(#shadow)"/>

  <!-- 柄部绿色 -->
  <rect x="84" y="94" width="32" height="72" rx="16" ry="16" fill="url(#green)"/>
  <ellipse cx="100" cy="210" rx="20" ry="30" fill="url(#green)"/>

  <!-- ══════ 装饰：左卷草 ══════ -->
  <g fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round">
    <!-- 左卷 -->
    <path d="M 72 75 C 50 75, 42 58, 52 50 C 62 42, 72 52, 64 62 C 58 68, 52 64, 55 58"/>
    <!-- 右卷 -->
    <path d="M 128 75 C 150 75, 158 58, 148 50 C 138 42, 128 52, 136 62 C 142 68, 148 64, 145 58"/>
    <!-- 柄上卷 左 -->
    <path d="M 84 140 C 68 140, 62 128, 70 122 C 76 118, 82 124, 77 130"/>
    <!-- 柄上卷 右 -->
    <path d="M 116 140 C 132 140, 138 128, 130 122 C 124 118, 118 124, 123 130"/>
  </g>

  <!-- ══════ 顶部小圆珠 ══════ -->
  <circle cx="100" cy="30" r="8"  fill="url(#gold)"/>
  <circle cx="100" cy="30" r="5"  fill="url(#green)"/>

  <!-- ══════ 柄中菱形 ══════ -->
  <polygon points="100,170 108,180 100,190 92,180" fill="url(#gold)"/>
  <polygon points="100,173 106,180 100,187 94,180" fill="url(#green)"/>

  <!-- ══════ 底部小卷草 ══════ -->
  <g fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round">
    <path d="M 88 222 C 78 222, 74 232, 80 236 C 86 240, 90 234, 86 230"/>
    <path d="M 112 222 C 122 222, 126 232, 120 236 C 114 240, 110 234, 114 230"/>
  </g>
</svg>
